<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>회원정보 수정 폼</title>
</head>

<body>

    <h2>내정보수정</h2>
    <hr>

    <br>

    <table border="0" width="80%" align="center" cellspacing="0" cellpadding="10">
        <tr>
            <td width="150"><strong>이메일</strong></td>
            <td>
                <input type="text" value="user@example.com" size="40" style="height: 25px; background-color: #eee;"
                    readonly>
            </td>
        </tr>
        <tr>
            <td><strong>변경할 비밀번호</strong></td>
            <td><input type="password" size="40" style="height: 25px;"></td>
        </tr>
        <tr>
            <td><strong>비밀번호 확인</strong></td>
            <td><input type="password" size="40" style="height: 25px;"></td>
        </tr>
        <tr>
            <td><strong>휴대전화</strong></td>
            <td><input type="text" size="40" style="height: 25px;"></td>
        </tr>
        <tr>
            <td><strong>우편번호</strong></td>
            <td><input type="text" size="20" style="height: 25px;"> <button>검색</button></td>
        </tr>
        <tr>
            <td><strong>상세 주소</strong></td>
            <td><input type="text" size="60" style="height: 25px;"></td>
        </tr>
    </table>

    <br><br>

    <div align="right" style="padding-right: 100px;">
        <button style="width: 100px; height: 40px; font-weight: bold;">확인</button>
    </div>
    <div align="right" style="padding-right: 100px;">
        <button style="width: 100px; height: 40px; font-weight: bold;">계정삭제</button>
    </div>
</body>

</html>
