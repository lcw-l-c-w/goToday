<!DOCTYPE html>
<html lang='ko'>

<head>
    <meta charset='utf-8' />
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 캘린더 스타일 미세 조정 */
        #calendar {
            max-width: 100%;
        }

        .fc-toolbar-title {
            font-size: 20px !important;
        }

        /* 오른쪽 리스트 스타일 */
        #event-container {
            padding: 20px;
            border-left: 1px solid #ddd;
            /* 달력과 구분선 */
            height: 100%;
        }

        .event-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
    </style>

    <script>
        // 1. 일정 데이터를 따로 변수로 뺍니다 (나중에 DB에서 가져올 형태)
        var myEvents = [
            { title: '학원 수업', date: '2026-01-09' },
            { title: '1차 프로젝트 회의', date: '2026-01-15' },
            { title: '자바 스터디', date: '2026-01-15' }, // 같은 날짜 일정 2개 테스트
            { title: '친구 약속', date: '2026-01-20' },
            { title: '팝업스토어 방문', date: '2026-02-14' }
        ];

        document.addEventListener('DOMContentLoaded', function () {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                selectable: true, // 날짜 선택 가능하게 설정

                // [중요] 날짜를 클릭했을 때 실행되는 함수
                dateClick: function (info) {
                    // 1. 클릭한 날짜 가져오기 (예: 2026-01-15)
                    var clickedDate = info.dateStr;

                    // 2. 오른쪽 제목 변경
                    document.getElementById('selected-date-title').innerText = clickedDate;

                    // 3. 해당 날짜에 맞는 일정 찾기
                    var filteredEvents = myEvents.filter(function (event) {
                        return event.date === clickedDate;
                    });

                    // 4. 오른쪽 리스트 초기화 후 다시 그리기
                    var listDiv = document.getElementById('event-list-box');
                    listDiv.innerHTML = ""; // 기존 내용 지우기

                    if (filteredEvents.length > 0) {
                        // 일정이 있으면 리스트 생성
                        filteredEvents.forEach(function (event) {
                            listDiv.innerHTML += "<div class='event-item'>• " + event.title + "</div>";
                        });
                    } else {
                        // 일정이 없으면
                        listDiv.innerHTML = "<div class='event-item' style='color:#999;'>일정이 없습니다.</div>";
                    }
                },

                // 달력 안에 점이나 바 표시 (선택사항)
                events: myEvents
            });
            calendar.render();
        });
    </script>
</head>

<body>

    <table width="100%" height="800" border="0" cellspacing="0" cellpadding="0">
        <tr valign="top">

            <td width="70%" style="padding-right: 20px;">
                <div id='calendar'></div>
            </td>

            <td width="30%">
                <div id="event-container">
                    <h2 id="selected-date-title" style="margin-top: 0;">날짜를 선택하세요</h2>
                    <hr>
                    <br>

                    <div id="event-list-box">
                        <div style="color: #999;">
                            달력의 날짜를 클릭하면<br>
                            일정이 여기에 표시됩니다.
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>

</body>

</html>
